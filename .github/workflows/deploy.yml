name: Continuous Deployment

on:
  push:
    branches:
      - main # Change to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Ubuntu Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/zojotu
            
            # Clone the repo if it doesn't exist, otherwise pull latest changes
            if [ ! -d "zojotu_app" ]; then
              git clone https://github.com/${{ github.repository }}.git zojotu_app
            else
              cd zojotu_app
              git pull
              cd ..
            fi
            
            # Rebuild and restart the containers containerized
            docker-compose up -d --build