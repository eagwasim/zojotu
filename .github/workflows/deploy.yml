name: Continuous Deployment

on:
  push:
    branches:
      - main # Change to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Ubuntu Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/zojotu
            
            # Clean up old subfolders if they still exist to prevent confusion
            rm -rf zojotu_app repo
            
            # Initialize git directly in the current directory if it hasn't been already
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            
            # Fetch the latest code and forcefully align the directory with your main branch
            git fetch --all
            git reset --hard origin/main
            
            # Rebuild and restart the stack using the compose file in this folder
            docker-compose up -d --build --remove-orphans